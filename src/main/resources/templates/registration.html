<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — Dimitri Liubomudrov</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .page-card {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .page-card h1 {
      margin: 0 0 0.25rem 0;
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
    }
    .page-card .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      font-size: 1rem;
      color: #fff;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      outline: none;
    }
    .form-group input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    .form-group input:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233,69,96,0.25);
    }
    .form-group input.invalid {
      border-color: #e94560;
      background: rgba(233,69,96,0.1);
    }
    .form-group .error-msg {
      font-size: 0.8rem;
      color: #ffb3b3;
      margin-top: 0.35rem;
    }
    .btn-main {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #e94560;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn-main:hover {
      background: #c73e54;
    }
    .link-row {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
    }
    .link-row a {
      color: #e94560;
      text-decoration: none;
      font-weight: 500;
    }
    .link-row a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page-card">
    <h1>Create account</h1>
    <p class="subtitle">Sign up to get started</p>

    <form th:method="POST" th:action="@{/auth/registration}" th:object="${user}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" th:field="*{username}" th:classappend="${#fields.hasErrors('username')} ? 'invalid' : ''" id="username" placeholder="Choose a username" autocomplete="username">
        <div class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Error</div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'invalid' : ''" id="email" placeholder="you@example.com" autocomplete="email">
        <div class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" th:field="*{password}" th:classappend="${#fields.hasErrors('password')} ? 'invalid' : ''" id="password" placeholder="Choose a password" autocomplete="new-password">
        <div class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</div>
      </div>

      <button type="submit" class="btn-main">Sign up</button>
    </form>

    <p class="link-row">
      Already have an account? <a th:href="@{/auth/login}">Sign in</a>
    </p>
  </div>
</body>
</html>
